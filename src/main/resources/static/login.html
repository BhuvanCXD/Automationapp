<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cyber X Delta</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>

<body class="w-full h-screen overflow-hidden bg-black font-sans text-white transition-opacity duration-1000">

    <!-- Background Layer -->
    <div class="absolute inset-0 z-0 overflow-hidden bg-black">
        <!-- Blue Glow at Bottom -->
        <div
            class="absolute bottom-0 left-0 right-0 h-[60vh] bg-gradient-to-t from-blue-700/50 via-blue-900/20 to-transparent pointer-events-none">
        </div>
    </div>

    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center animate-fade-in">

        <div class="w-full flex flex-col items-center pt-12 md:pt-0">
            <!-- Main Title -->
            <h1
                class="text-3xl font-bold tracking-tight text-white mb-12 drop-shadow-lg text-center px-4 font-outfit uppercase">
                Cyber X Delta
            </h1>

            <div class="w-full px-4 flex justify-center">
                <div class="w-full max-w-[400px]">
                    <div class="bg-[#111115]/80 backdrop-blur-md border border-white/5 rounded-2xl p-8 shadow-2xl">

                        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">

                            <div id="alert" class="hidden p-3 rounded text-sm mb-4"></div>

                            <!-- Username Input -->
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-white block">
                                    Username
                                </label>
                                <input type="text" id="username"
                                    class="w-full bg-[#E2E2E5] border-none text-gray-900 text-sm rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500 font-medium"
                                    placeholder="Enter Username" required />
                            </div>

                            <!-- Password Input -->
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-white block">
                                    Password
                                </label>
                                <input type="password" id="password"
                                    class="w-full bg-[#E2E2E5] border-none text-gray-900 text-sm rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500 font-medium"
                                    placeholder="Enter Password" required />
                            </div>

                            <!-- Login Button -->
                            <button type="submit" id="loginButton"
                                class="w-full mt-4 bg-gradient-to-r from-[#4361EE] to-[#3A0CA3] hover:from-[#3A0CA3] hover:to-[#4361EE] text-white font-medium py-3 px-4 rounded-md transition-all duration-200 shadow-lg shadow-blue-500/20 flex justify-center items-center">
                                Login
                            </button>

                            <div class="text-center mt-6">
                                <a href="register.html"
                                    class="text-sm text-gray-400 hover:text-white transition-colors">Don't have an
                                    account? Sign Up</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        let csrfTokenReady = false;

        window.addEventListener('load', async function () {
            // Redirect to dashboard if already logged in
            if (Utils.isAuthenticated()) {
                window.location.href = '/index.html';
            }
            // Ensure CSRF token is fetched
            try {
                await fetch(window.location.origin + '/csrf', { credentials: 'include' });
                csrfTokenReady = true;
            } catch (e) {
                console.error('Failed to fetch CSRF token');
            }
        });

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `p-3 rounded text-sm mb-4 ${type === 'danger' ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 'bg-green-500/20 text-green-400 border border-green-500/50'}`;
            alert.classList.remove('hidden');
        }

        async function handleLogin(event) {
            event.preventDefault();

            if (!csrfTokenReady) {
                showAlert('Security token not ready. Please wait...', 'danger');
                return;
            }

            const btn = document.getElementById('loginButton');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-4 w-4 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Logging in...
            `;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await API.login(username.trim(), password);
                if (response.status && response.status === 'success') {
                    Utils.setCurrentUser({ username: response.username || username.trim() });
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    showAlert('Login failed: ' + (response.message || 'Check credentials'), 'danger');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (error) {
                showAlert('Login failed: ' + error.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>

</html>
